syntax = "proto3";
package orchestrator.v1;

message SpeakerInfo {
  string id = 1;
  string name = 2;
  string matching_id = 3;
}

message AudioConfig {
  uint32 sample_rate = 1;
  uint32 channels = 2;
}

message AudioChunk {
  // PCM f32 samples (mono, 24kHz), normalized to -1.0..1.0
  repeated float samples = 1;
  uint32 sequence = 2;
  bool is_final = 3;
}

// Request to get audio configuration
message GetConfigRequest {}

// Response containing audio configuration
message GetConfigResponse {
  // The audio configuration
  AudioConfig config = 1;
}
